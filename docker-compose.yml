version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: services/php/Dockerfile
    container_name: laravel_php
    volumes:
      - ./src:/var/www
    networks:
      - laravel

  nginx:
    image: nginx:latest
    container_name: laravel_nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./services/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - laravel

  db:
    image: mysql:8
    container_name: laravel_db
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    ports:
      - "3306:3306"
    volumes:
      - laravel_mysql_data:/var/lib/mysql   # 🔥 IMPORTANT FIX
    networks:
      - laravel

networks:
  laravel:

volumes:
  laravel_mysql_data:
    name: laravel_mysql_data   # 🔥 prevents new random volumes